services:
  postgres:
    image: postgres:16-alpine
    profiles:
      - local-db
    container_name: enhanced-cse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: enhanced_cse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enhanced_cse"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: enhanced-cse-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      WP_API_BASE: http://blogs.qu.edu.qa/cse/wp-json/wp/v2
      WP_POST_TYPE: epkb_post_type_1
      SYNC_SECRET: local-sync-secret
      CRON_SECRET: local-cron-secret
      SYNC_BASE_URL: http://localhost:3000
      PUBLIC_API_RATE_LIMIT_REQUESTS: ${PUBLIC_API_RATE_LIMIT_REQUESTS:-120}
      PUBLIC_API_RATE_LIMIT_WINDOW_SECONDS: ${PUBLIC_API_RATE_LIMIT_WINDOW_SECONDS:-60}
    # Run database migrations, then start the production server
    command: sh -c "npm run db:migrate && npm start"
    develop:
      watch:
        # Frontend + backend application sources
        - action: rebuild
          path: ./app
        - action: rebuild
          path: ./components
        - action: rebuild
          path: ./lib

        # Static assets can be synced directly
        - action: sync
          path: ./public
          target: /app/public

        # Migration/config tweaks should be applied without a full image rebuild
        - action: sync+restart
          path: ./drizzle
          target: /app/drizzle
        - action: sync+restart
          path: ./drizzle.config.ts
          target: /app/drizzle.config.ts

        # Dependency/build-system changes require a rebuild
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
        - action: rebuild
          path: ./next.config.mjs
        - action: rebuild
          path: ./tailwind.config.ts
        - action: rebuild
          path: ./postcss.config.mjs
        - action: rebuild
          path: ./tsconfig.json
        - action: rebuild
          path: ./Dockerfile

volumes:
  postgres_data:
