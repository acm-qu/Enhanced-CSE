services:
  postgres:
    image: postgres:16-alpine
    container_name: enhanced-cse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: enhanced_cse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enhanced_cse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
