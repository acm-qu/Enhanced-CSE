name: Scheduled Content Sync

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

concurrency:
  group: scheduled-content-sync
  cancel-in-progress: false

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate required secrets
        env:
          SYNC_URL: ${{ secrets.VERCEL_SYNC_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SYNC_URL" ]; then
            echo "Missing secret: VERCEL_SYNC_CRON_URL" >&2
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing secret: CRON_SECRET" >&2
            exit 1
          fi

      - name: Trigger protected sync endpoint
        env:
          SYNC_URL: ${{ secrets.VERCEL_SYNC_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          HTTP_STATUS=$(curl -sS --retry 3 --retry-all-errors --retry-delay 5 \
            -o response.json -w "%{http_code}" \
            -X GET "$SYNC_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Accept: application/json")

          echo "HTTP status: $HTTP_STATUS"
          cat response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Sync request failed with HTTP $HTTP_STATUS" >&2
            exit 1
          fi
